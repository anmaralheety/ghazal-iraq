<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>غزل عراقي</title>
<script src="/socket.io/socket.io.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700;900&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--gold:#f5a623;--gl:#ffd166;--gd:#d4860a;--deep:#0a1628;--mid:#0d2444;--w:#fff;--mut:#90b4d4;--grn:#00e676;}
html,body{height:100%;overflow:hidden;font-family:'Cairo',sans-serif;background:var(--deep);color:var(--w);}
.bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 20% 50%,rgba(21,101,192,.3),transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(245,166,35,.15),transparent 50%),linear-gradient(135deg,#050d1a,#0a1628,#0d2444);}
.stars{position:fixed;inset:0;z-index:0;overflow:hidden;}
.star{position:absolute;border-radius:50%;background:white;animation:tw linear infinite;}
@keyframes tw{0%,100%{opacity:0}50%{opacity:1}}

/* LANDING */
#landing{position:relative;z-index:1;height:100vh;display:flex;flex-direction:column;overflow-y:auto;}
.site-hdr{padding:14px 32px;display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.03);backdrop-filter:blur(20px);border-bottom:1px solid rgba(245,166,35,.15);flex-shrink:0;}
.logo{display:flex;align-items:center;gap:12px;}
.logo-ic{width:46px;height:46px;background:linear-gradient(135deg,var(--gold),var(--gd));border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 0 25px rgba(245,166,35,.5);}
.logo-t{font-family:'Tajawal',sans-serif;font-size:20px;font-weight:900;background:linear-gradient(135deg,var(--gl),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.logo-s{font-size:10px;color:var(--mut);letter-spacing:2px;}
.sbdg{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);padding:6px 14px;border-radius:50px;font-size:12px;}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--grn);animation:pulse 2s ease-in-out infinite;box-shadow:0 0 8px var(--grn);}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.5)}}
.hero{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 20px;text-align:center;}
.hero-badge{display:inline-flex;align-items:center;gap:7px;background:rgba(245,166,35,.1);border:1px solid rgba(245,166,35,.3);padding:7px 18px;border-radius:50px;font-size:12px;color:var(--gl);margin-bottom:24px;}
.hero-h{font-family:'Tajawal',sans-serif;font-size:clamp(32px,5vw,64px);font-weight:900;line-height:1.1;margin-bottom:12px;}
.hero-h .g{background:linear-gradient(135deg,var(--gl),var(--gold),#ff8f00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hero-p{font-size:15px;color:var(--mut);max-width:480px;line-height:1.8;margin-bottom:38px;}
.btn-grp{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
.btn{padding:13px 28px;border-radius:12px;font-family:'Cairo',sans-serif;font-size:15px;font-weight:700;border:none;cursor:pointer;transition:all .3s cubic-bezier(.34,1.56,.64,1);display:flex;align-items:center;gap:8px;}
.btn:hover{transform:translateY(-3px) scale(1.02);}
.btn-p{background:linear-gradient(135deg,var(--gold),var(--gd),#e65100);color:white;box-shadow:0 6px 25px rgba(245,166,35,.4);}
.btn-s{background:rgba(255,255,255,.06);color:var(--w);border:1px solid rgba(255,255,255,.15);}
.btn-g{background:transparent;color:var(--gl);border:2px solid rgba(245,166,35,.4);}
.feats{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;padding:28px 20px;}
.fc{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:20px 22px;text-align:center;max-width:155px;transition:.3s;}
.fc:hover{background:rgba(245,166,35,.08);border-color:rgba(245,166,35,.25);transform:translateY(-5px);}
.fc .fi2{font-size:30px;margin-bottom:9px;display:block;}
.fc .ft{font-weight:700;font-size:13px;margin-bottom:3px;}
.fc .fd{font-size:11px;color:var(--mut);}

/* MODALS */
.overlay{position:fixed;inset:0;z-index:100;background:rgba(5,13,26,.88);backdrop-filter:blur(20px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:.4s;}
.overlay.on{opacity:1;pointer-events:all;}
.modal{background:linear-gradient(145deg,#0d1f3c,#0a1628);border:1px solid rgba(245,166,35,.25);border-radius:24px;padding:34px;width:390px;max-width:94vw;transform:scale(.9) translateY(30px);transition:.4s cubic-bezier(.34,1.56,.64,1);position:relative;overflow:hidden;}
.modal::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--gold),var(--gl),var(--gold),transparent);}
.overlay.on .modal{transform:scale(1) translateY(0);}
.mhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
.mtit{font-family:'Tajawal',sans-serif;font-size:19px;font-weight:800;background:linear-gradient(135deg,var(--gl),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.mcl{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:var(--mut);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.mcl:hover{background:rgba(255,80,80,.2);color:white;}
.fg{margin-bottom:14px;}
.fl{display:block;font-size:11px;color:var(--mut);margin-bottom:6px;font-weight:600;}
.fi,.fsel{width:100%;padding:12px 14px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:11px;color:white;font-family:'Cairo',sans-serif;font-size:14px;outline:none;appearance:none;-webkit-appearance:none;transition:.3s;}
.fi:focus,.fsel:focus{border-color:var(--gold);background:rgba(245,166,35,.06);}
.fi::placeholder{color:rgba(255,255,255,.25);}
.fsel option{background:#0d1f3c;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.sw{position:relative;}.sw::after{content:'▼';position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:9px;color:var(--gold);pointer-events:none;}
.btn-full{width:100%;justify-content:center;padding:13px;font-size:15px;border-radius:11px;margin-top:6px;}
.fmsg{font-size:12px;margin-top:8px;padding:8px 12px;border-radius:9px;display:none;}
.fmsg.e{background:rgba(239,83,80,.1);color:#ef9a9a;border:1px solid rgba(239,83,80,.2);display:block;}
.fmsg.k{background:rgba(0,230,118,.1);color:#a5d6a7;border:1px solid rgba(0,230,118,.2);display:block;}

/* ===== CHAT PAGE ===== */
#chat-page{
  display:none;
  position:fixed;
  inset:0;
  z-index:1;
  flex-direction:column;
}
.chat-hdr{
  height:58px;
  flex-shrink:0;
  background:rgba(10,22,40,.97);
  backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(245,166,35,.2);
  padding:0 16px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  z-index:10;
}
.clogo{display:flex;align-items:center;gap:9px;cursor:pointer;}
.clogo-ic{width:36px;height:36px;background:linear-gradient(135deg,var(--gold),var(--gd));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;}
.clogo-t{font-family:'Tajawal',sans-serif;font-weight:900;font-size:15px;background:linear-gradient(135deg,var(--gl),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.cnav{display:flex;gap:3px;}
.cnav-btn{padding:6px 14px;border-radius:8px;background:transparent;border:none;color:var(--mut);font-family:'Cairo',sans-serif;font-size:12px;cursor:pointer;transition:.2s;}
.cnav-btn:hover,.cnav-btn.on{background:rgba(245,166,35,.12);color:var(--gl);}

/* THE KEY FIX - chat body fills remaining space */
.chat-body{
  flex:1;
  display:grid;
  grid-template-columns:240px 1fr 260px;
  min-height:0; /* CRITICAL */
  overflow:hidden;
}

/* PANELS */
.rpanel,.upanel{background:rgba(8,18,35,.85);display:flex;flex-direction:column;overflow:hidden;min-height:0;}
.rpanel{border-left:1px solid rgba(255,255,255,.06);}
.upanel{border-right:1px solid rgba(255,255,255,.06);}
.phdr{padding:13px 15px;font-size:10px;font-weight:700;color:var(--gold);letter-spacing:2px;text-transform:uppercase;border-bottom:1px solid rgba(255,255,255,.05);display:flex;align-items:center;gap:5px;flex-shrink:0;}
.slist{flex:1;overflow-y:auto;padding:7px;}
.slist::-webkit-scrollbar{width:3px;}.slist::-webkit-scrollbar-thumb{background:rgba(245,166,35,.3);border-radius:3px;}
.ri{padding:10px 12px;border-radius:10px;cursor:pointer;transition:.2s;margin-bottom:3px;display:flex;align-items:center;gap:8px;border:1px solid transparent;}
.ri:hover{background:rgba(245,166,35,.08);border-color:rgba(245,166,35,.15);}
.ri.on{background:rgba(245,166,35,.15);border-color:rgba(245,166,35,.3);}
.r-ic{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.r-nm{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.r-cn{font-size:10px;color:var(--mut);}

/* MAIN CHAT - THE KEY */
.cmain{
  display:flex;
  flex-direction:column;
  background:rgba(6,14,26,.6);
  min-height:0; /* CRITICAL */
  overflow:hidden;
}
.crhdr{padding:11px 16px;background:rgba(255,255,255,.02);border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:9px;flex-shrink:0;}
.cr-nm{font-size:14px;font-weight:700;}
.cr-sb{font-size:11px;color:var(--mut);}

/* MESSAGES - THE KEY */
.msgs{
  flex:1;
  overflow-y:auto;
  padding:15px;
  display:flex;
  flex-direction:column;
  gap:3px;
  min-height:0; /* CRITICAL */
}
.msgs::-webkit-scrollbar{width:3px;}.msgs::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px;}
.welcome{background:linear-gradient(135deg,rgba(245,166,35,.1),rgba(245,166,35,.05));border:1px solid rgba(245,166,35,.2);border-radius:11px;padding:11px 16px;margin-bottom:12px;text-align:center;font-size:12px;color:var(--gl);}
.msg{display:flex;align-items:flex-start;gap:8px;padding:4px 3px;border-radius:8px;transition:.2s;animation:mi .25s ease;}
@keyframes mi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg:hover{background:rgba(255,255,255,.03);}
.av{width:34px;height:34px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;}
.mc{flex:1;min-width:0;}
.mh{display:flex;align-items:center;gap:6px;margin-bottom:2px;flex-wrap:wrap;}
.mn{font-size:13px;font-weight:700;}
.mb{font-size:9px;padding:2px 6px;border-radius:50px;font-weight:700;border:1px solid;}
.mt{font-size:10px;color:var(--mut);margin-right:auto;}
.mx{font-size:13px;color:rgba(255,255,255,.85);line-height:1.6;word-break:break-word;}
.sys{text-align:center;padding:5px;font-size:11px;color:var(--gold);background:rgba(245,166,35,.06);border-radius:8px;margin:3px 0;animation:mi .25s ease;}
.ntc{text-align:center;padding:6px;font-size:12px;color:#ef9a9a;background:rgba(239,83,80,.08);border-radius:8px;margin:3px 0;}

/* INPUT - STAYS AT BOTTOM */
.cin-area{
  flex-shrink:0; /* NEVER SHRINK */
  padding:12px 15px;
  background:rgba(8,18,35,.9);
  border-top:1px solid rgba(255,255,255,.07);
}
.cin-bar{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:13px;padding:5px 5px 5px 13px;transition:.3s;}
.cin-bar:focus-within{border-color:rgba(245,166,35,.4);background:rgba(245,166,35,.04);}
.cin{flex:1;background:transparent;border:none;outline:none;color:white;font-family:'Cairo',sans-serif;font-size:13px;padding:7px 0;direction:rtl;}
.cin::placeholder{color:rgba(255,255,255,.25);}
.cin:disabled{opacity:.4;cursor:not-allowed;}
.ib{width:36px;height:36px;border-radius:10px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:.2s;flex-shrink:0;}
.ibe{background:transparent;color:var(--mut);}.ibe:hover{color:var(--gold);background:rgba(245,166,35,.1);}
.ibs{background:linear-gradient(135deg,var(--gold),var(--gd));color:white;box-shadow:0 3px 12px rgba(245,166,35,.3);}
.ibs:hover{transform:scale(1.1);}

/* EMOJI */
.epicker{position:absolute;bottom:70px;right:15px;background:linear-gradient(145deg,#0d1f3c,#0a1628);border:1px solid rgba(245,166,35,.2);border-radius:13px;padding:12px;display:none;grid-template-columns:repeat(8,1fr);gap:4px;z-index:50;box-shadow:0 15px 50px rgba(0,0,0,.5);}
.epicker.on{display:grid;}
.eb{background:transparent;border:none;font-size:19px;cursor:pointer;padding:3px;border-radius:6px;transition:.15s;line-height:1;}
.eb:hover{background:rgba(255,255,255,.1);transform:scale(1.3);}

/* USERS PANEL */
.ucbar{padding:8px 13px;background:linear-gradient(135deg,rgba(245,166,35,.15),rgba(245,166,35,.05));border-bottom:1px solid rgba(245,166,35,.15);display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--gl);flex-shrink:0;}
.usl{font-size:9px;font-weight:700;color:var(--gold);letter-spacing:2px;text-transform:uppercase;padding:7px 9px 3px;display:flex;align-items:center;gap:5px;}
.usl::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(245,166,35,.3),transparent);}
.ui{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:9px;cursor:pointer;transition:.2s;margin-bottom:2px;}
.ui:hover{background:rgba(255,255,255,.05);}
.uav{width:34px;height:34px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;position:relative;}
.udot{position:absolute;bottom:0;right:0;width:9px;height:9px;border-radius:50%;background:var(--grn);border:2px solid #08122d;}
.un{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.um{font-size:10px;color:var(--mut);}

/* CTX */
.ctx{position:fixed;background:linear-gradient(145deg,#0d1f3c,#0a1628);border:1px solid rgba(245,166,35,.25);border-radius:11px;padding:5px;z-index:999;box-shadow:0 15px 50px rgba(0,0,0,.6);min-width:160px;display:none;}
.ctx.on{display:block;}
.ctx-i{padding:8px 11px;border-radius:8px;cursor:pointer;font-size:12px;display:flex;align-items:center;gap:6px;transition:.2s;}
.ctx-i:hover{background:rgba(245,166,35,.1);color:var(--gl);}
.ctx-i.d{color:#ef9a9a;}.ctx-i.d:hover{background:rgba(239,83,80,.15);}

/* PM */
.pm{position:fixed;bottom:16px;left:16px;width:290px;background:linear-gradient(145deg,#0d1f3c,#0a1628);border:1px solid rgba(245,166,35,.3);border-radius:15px;z-index:200;box-shadow:0 15px 50px rgba(0,0,0,.6);display:none;flex-direction:column;}
.pm.on{display:flex;}
.pmh{padding:11px 13px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.06);}
.pmt{font-size:12px;font-weight:700;color:var(--gl);}
.pmc{background:transparent;border:none;color:var(--mut);font-size:15px;cursor:pointer;}
.pmm{height:180px;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:6px;}
.pmmsg{font-size:12px;padding:6px 10px;border-radius:8px;max-width:85%;}
.pms{background:rgba(245,166,35,.15);color:var(--gl);align-self:flex-start;}
.pmr{background:rgba(255,255,255,.06);align-self:flex-end;}
.pmir{display:flex;gap:6px;padding:8px;border-top:1px solid rgba(255,255,255,.06);}
.pmin{flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:6px 10px;color:white;font-family:'Cairo',sans-serif;font-size:12px;outline:none;direction:rtl;}
.pmse{background:linear-gradient(135deg,var(--gold),var(--gd));border:none;border-radius:8px;padding:6px 12px;color:white;cursor:pointer;}

/* ADMIN */
.apanel{position:fixed;inset:0;z-index:200;background:rgba(5,13,26,.97);backdrop-filter:blur(20px);display:none;flex-direction:column;}
.apanel.on{display:flex;}
.ahdr{padding:16px 26px;display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.03);border-bottom:1px solid rgba(245,166,35,.2);}
.atit{font-family:'Tajawal',sans-serif;font-size:20px;font-weight:900;background:linear-gradient(135deg,var(--gl),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.abdy{flex:1;overflow-y:auto;padding:24px;}
.atbl{width:100%;border-collapse:collapse;}
.atbl th{padding:10px 13px;text-align:right;font-size:10px;font-weight:700;color:var(--gold);letter-spacing:1px;border-bottom:1px solid rgba(245,166,35,.2);}
.atbl td{padding:10px 13px;border-bottom:1px solid rgba(255,255,255,.05);font-size:12px;vertical-align:middle;}
.atbl tr:hover td{background:rgba(255,255,255,.02);}
.aab{padding:4px 9px;border-radius:7px;border:none;cursor:pointer;font-family:'Cairo',sans-serif;font-size:11px;font-weight:700;transition:.2s;margin:2px;}
.ab-ban{background:rgba(239,83,80,.2);color:#ef9a9a;border:1px solid rgba(239,83,80,.3);}
.ab-unban{background:rgba(0,230,118,.2);color:#a5d6a7;border:1px solid rgba(0,230,118,.3);}
.tag-ok{background:rgba(0,230,118,.15);color:#a5d6a7;padding:2px 7px;border-radius:50px;font-size:10px;}
.tag-ban{background:rgba(239,83,80,.15);color:#ef9a9a;padding:2px 7px;border-radius:50px;font-size:10px;}

/* TOAST */
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-80px);background:linear-gradient(135deg,#0d1f3c,#0a1628);border:1px solid rgba(245,166,35,.3);border-radius:11px;padding:11px 20px;font-size:13px;z-index:1000;box-shadow:0 15px 50px rgba(0,0,0,.5);transition:.4s cubic-bezier(.34,1.56,.64,1);}
.toast.on{transform:translateX(-50%) translateY(0);}
.toast.e{border-color:rgba(239,83,80,.4);color:#ef9a9a;}
.toast.k{border-color:rgba(0,230,118,.4);color:#a5d6a7;}

/* RANK BADGES */
.rk-owner{background:rgba(255,107,53,.2);color:#ff6b35;border-color:rgba(255,107,53,.4);}
.rk-admin{background:rgba(255,193,7,.2);color:#ffd54f;border-color:rgba(255,193,7,.3);}
.rk-vip{background:rgba(156,39,176,.2);color:#ce93d8;border-color:rgba(156,39,176,.3);}
.rk-member{background:rgba(66,165,245,.15);color:#90caf9;border-color:rgba(66,165,245,.2);}
.rk-visitor{background:rgba(255,255,255,.08);color:#ccc;border-color:rgba(255,255,255,.15);}

/* ===== FOOTER ===== */
.site-footer {
  background: rgba(5,10,20,.9);
  border-top: 1px solid rgba(245,166,35,.15);
  padding: 18px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
  flex-shrink: 0;
}
.footer-links { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.footer-btn {
  background: transparent;
  border: 1px solid rgba(255,255,255,.1);
  color: var(--mut);
  padding: 5px 12px;
  border-radius: 20px;
  font-family: 'Cairo', sans-serif;
  font-size: 11px;
  cursor: pointer;
  transition: .2s;
}
.footer-btn:hover { border-color: rgba(245,166,35,.4); color: var(--gl); background: rgba(245,166,35,.07); }
.footer-copy { font-size: 11px; color: rgba(255,255,255,.25); }

/* ===== POLICY MODAL ===== */
.policy-overlay {
  position: fixed;
  inset: 0;
  z-index: 500;
  background: rgba(5,13,26,.95);
  backdrop-filter: blur(20px);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: .3s;
}
.policy-overlay.on { opacity: 1; pointer-events: all; }
.policy-modal {
  background: linear-gradient(145deg,#0d1f3c,#0a1628);
  border: 1px solid rgba(245,166,35,.2);
  border-radius: 20px;
  width: 720px;
  max-width: 95vw;
  max-height: 88vh;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
  transform: translateY(30px);
  transition: .4s cubic-bezier(.34,1.56,.64,1);
}
.policy-modal::before {
  content:'';
  position:absolute;
  top:0;left:0;right:0;
  height:3px;
  background:linear-gradient(90deg,transparent,var(--gold),var(--gl),var(--gold),transparent);
}
.policy-overlay.on .policy-modal { transform: translateY(0); }
.policy-hdr {
  padding: 18px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid rgba(255,255,255,.08);
  flex-shrink: 0;
}
.policy-tabs {
  display: flex;
  gap: 8px;
}
.policy-tab {
  padding: 7px 16px;
  border-radius: 20px;
  background: transparent;
  border: 1px solid rgba(255,255,255,.1);
  color: var(--mut);
  font-family: 'Cairo', sans-serif;
  font-size: 12px;
  cursor: pointer;
  transition: .2s;
}
.policy-tab.active {
  background: rgba(245,166,35,.15);
  border-color: rgba(245,166,35,.4);
  color: var(--gl);
}
.policy-close {
  width: 34px; height: 34px;
  border-radius: 50%;
  background: rgba(255,255,255,.05);
  border: 1px solid rgba(255,255,255,.1);
  color: var(--mut);
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: .2s;
}
.policy-close:hover { background: rgba(239,83,80,.2); color: white; }
.policy-body {
  flex: 1;
  overflow-y: auto;
  padding: 24px 28px;
  line-height: 1.9;
  color: rgba(255,255,255,.8);
  font-size: 13px;
}
.policy-body::-webkit-scrollbar { width: 4px; }
.policy-body::-webkit-scrollbar-thumb { background: rgba(245,166,35,.3); border-radius: 4px; }
.policy-body h2 {
  font-family: 'Tajawal', sans-serif;
  font-size: 18px;
  font-weight: 800;
  background: linear-gradient(135deg,var(--gl),var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 16px;
}
.policy-body h3 {
  font-size: 14px;
  font-weight: 700;
  color: var(--gl);
  margin: 20px 0 8px;
  padding-right: 10px;
  border-right: 3px solid var(--gold);
}
.policy-body p { margin-bottom: 12px; }
.policy-body .rule {
  background: rgba(255,255,255,.03);
  border: 1px solid rgba(255,255,255,.06);
  border-radius: 10px;
  padding: 12px 16px;
  margin-bottom: 8px;
  display: flex;
  align-items: flex-start;
  gap: 10px;
}
.policy-body .rule-icon { font-size: 16px; flex-shrink: 0; margin-top: 2px; }
.policy-body .rule-text { flex: 1; }
.policy-footer {
  padding: 14px 24px;
  border-top: 1px solid rgba(255,255,255,.06);
  text-align: center;
  font-size: 11px;
  color: var(--mut);
  flex-shrink: 0;
}

/* ===== EMOJI PICKER FULL ===== */
.epicker {
  position:absolute;
  bottom:70px;
  right:10px;
  left:10px;
  background:linear-gradient(145deg,#0d1f3c,#0a1628);
  border:1px solid rgba(245,166,35,.2);
  border-radius:16px;
  padding:10px;
  display:none;
  flex-direction:column;
  gap:8px;
  z-index:50;
  box-shadow:0 15px 50px rgba(0,0,0,.6);
  max-height:280px;
}
.epicker.on { display:flex; }
.ep-cats {
  display:flex;
  gap:4px;
  border-bottom:1px solid rgba(255,255,255,.08);
  padding-bottom:8px;
  flex-wrap:wrap;
}
.ep-cat {
  background:transparent;
  border:none;
  font-size:20px;
  cursor:pointer;
  padding:5px 8px;
  border-radius:8px;
  transition:.15s;
}
.ep-cat:hover, .ep-cat.active {
  background:rgba(245,166,35,.2);
  transform:scale(1.15);
}
.ep-grid {
  display:grid;
  grid-template-columns:repeat(8,1fr);
  gap:3px;
  overflow-y:auto;
  max-height:180px;
}
.ep-grid::-webkit-scrollbar { width:3px; }
.ep-grid::-webkit-scrollbar-thumb { background:rgba(245,166,35,.3); border-radius:3px; }

/* ===== MOBILE RESPONSIVE ===== */
@media (max-width: 768px) {

  /* Hide side panels by default on mobile */
  .rpanel { display: none; }
  .upanel { display: none; }

  /* Chat body - single column */
  .chat-body {
    grid-template-columns: 1fr !important;
  }

  /* Header mobile */
  .chat-hdr {
    padding: 0 10px;
    height: 52px;
  }
  .clogo-t { font-size: 13px; }
  .cnav-btn { padding: 5px 8px; font-size: 11px; }

  /* Input area - bigger on mobile */
  .cin-area { padding: 10px 12px; }
  .cin { font-size: 15px; }

  /* Emoji picker on mobile - full width bottom sheet */
  .epicker {
    position: fixed !important;
    bottom: 60px !important;
    left: 0 !important;
    right: 0 !important;
    border-radius: 16px 16px 0 0 !important;
    max-height: 300px !important;
  }
  .ep-grid { grid-template-columns: repeat(7, 1fr) !important; }

  /* Messages */
  .msgs { padding: 10px; }
  .mn { font-size: 13px; }
  .mx { font-size: 13px; }

  /* Mobile bottom nav */
  .mob-nav {
    display: flex !important;
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 56px;
    background: rgba(8,18,35,.97);
    border-top: 1px solid rgba(255,255,255,.08);
    z-index: 50;
    align-items: center;
    justify-content: space-around;
  }

  /* Push chat body up to avoid overlap with mobile nav */
  .cmain {
    padding-bottom: 0 !important;
  }

  /* Mobile drawer for rooms */
  .mob-drawer {
    display: flex !important;
    position: fixed;
    inset: 0;
    z-index: 300;
    background: rgba(5,13,26,.95);
    flex-direction: column;
    transform: translateX(100%);
    transition: transform .3s cubic-bezier(.4,0,.2,1);
  }
  .mob-drawer.open { transform: translateX(0); }
  .mob-drawer-hdr {
    padding: 16px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(255,255,255,.08);
    flex-shrink: 0;
  }
  .mob-drawer-hdr span { font-size: 15px; font-weight: 700; color: var(--gl); }
  .mob-drawer-close { background: rgba(255,255,255,.06); border: none; color: white; width: 34px; height: 34px; border-radius: 50%; font-size: 16px; cursor: pointer; }
  .mob-drawer-body { flex: 1; overflow-y: auto; padding: 10px; }

  /* Mobile nav buttons */
  .mob-nav-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    background: transparent;
    border: none;
    color: var(--mut);
    font-family: 'Cairo', sans-serif;
    cursor: pointer;
    padding: 6px 14px;
    border-radius: 10px;
    transition: .2s;
    font-size: 10px;
  }
  .mob-nav-btn.active { color: var(--gold); background: rgba(245,166,35,.1); }
  .mob-nav-btn span:first-child { font-size: 20px; }

  /* Room header mobile */
  .crhdr { padding: 9px 12px; }
  .cr-nm { font-size: 13px; }

  /* Landing mobile */
  .hero { padding: 30px 16px; }
  .hero-h { font-size: 28px; }
  .btn-grp { flex-direction: column; align-items: stretch; }
  .btn { justify-content: center; }
  .feats { gap: 10px; padding: 16px; }
  .fc { max-width: 130px; padding: 14px; }
  .site-hdr { padding: 10px 16px; }
}

/* Mobile nav hidden on desktop */
.mob-nav { display: none; }
.mob-drawer { display: none; }
/* ===== NEW RANK STYLES ===== */
.msg-big .mn { animation: nameGlow 2s infinite alternate; }
@keyframes nameGlow { from { opacity: 0.85; } to { opacity: 1; } }
.quiz-msg { display:flex; align-items:flex-start; gap:8px; padding:8px 12px; background:linear-gradient(135deg,#f9a82522,#ffd70011); border-right:3px solid #ffd700; margin:4px 8px; border-radius:8px; flex-wrap:wrap; }
.quiz-bot-badge { background:#ffd700; color:#000; font-size:11px; font-weight:700; padding:2px 8px; border-radius:12px; flex-shrink:0; }
.quiz-text { color:#fff; font-size:14px; line-height:1.5; flex:1; }

/* VOICE/VIDEO BAR */
.voice-bar { display:none; background:#1a1a2e; border-top:1px solid #333; padding:8px 12px; align-items:center; gap:8px; flex-shrink:0; }
.voice-bar.active { display:flex; }
.voice-btn { padding:6px 12px; border-radius:20px; border:none; cursor:pointer; font-size:12px; font-weight:600; transition:all .2s; }
.vbtn-mic { background:#2e7d32; color:#fff; }
.vbtn-mic.muted { background:#c62828; }
.vbtn-cam { background:#1565c0; color:#fff; }
.vbtn-cam.off { background:#555; }
.vbtn-leave { background:#c62828; color:#fff; }
.vbtn-join { background:#2e7d32; color:#fff; }
.voice-users { display:flex; gap:6px; flex:1; flex-wrap:wrap; }
.vu-chip { background:#ffffff15; border:1px solid #ffffff33; border-radius:12px; padding:2px 8px; font-size:11px; color:#ccc; display:flex; align-items:center; gap:4px; }
.vu-chip.speaking { border-color:#4caf50; color:#4caf50; animation: pulse 0.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.5;} }

/* VIDEO GRID */
.video-overlay { display:none; position:fixed; inset:0; background:#000e; z-index:200; align-items:center; justify-content:center; flex-direction:column; gap:12px; }
.video-overlay.show { display:flex; }
.video-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:12px; max-width:900px; width:90%; }
.video-item { background:#1a1a2e; border-radius:12px; overflow:hidden; position:relative; aspect-ratio:16/9; }
.video-item video { width:100%; height:100%; object-fit:cover; }
.video-item .vname { position:absolute; bottom:8px; left:8px; background:#000a; color:#fff; padding:2px 8px; border-radius:8px; font-size:12px; }
.video-close { background:#c62828; color:#fff; border:none; padding:10px 24px; border-radius:20px; cursor:pointer; font-size:14px; }

/* RANK SETRANK SELECT */
.rank-select { width:100%; padding:8px; background:#1a1a2e; color:#fff; border:1px solid #333; border-radius:8px; font-size:13px; }

/* AD WARNING */
.ad-toast { position:fixed; top:20px; left:50%; transform:translateX(-50%); background:#c62828; color:#fff; padding:12px 24px; border-radius:12px; font-size:14px; z-index:999; display:none; }
.ad-toast.show { display:block; animation:fadeInDown .3s; }
@keyframes fadeInDown { from{opacity:0;transform:translateX(-50%) translateY(-10px);} to{opacity:1;transform:translateX(-50%) translateY(0);} }

/* POINTS BADGE */
.points-badge { background:#ffd70022; border:1px solid #ffd70044; color:#ffd700; font-size:11px; padding:2px 8px; border-radius:12px; cursor:pointer; }

/* PROFILE MODAL */
#profile-modal.show { display:flex !important; }
@keyframes spin { from{transform:rotate(0deg);} to{transform:rotate(360deg);} }
.profile-action-btn { padding:8px 14px; border-radius:20px; border:none; cursor:pointer; font-size:13px; font-weight:600; transition:all .2s; }

</head>

async function regM(){
  const n=document.getElementById('rn').value.trim(),p=document.getElementById('rp').value,p2=document.getElementById('rp2').value;
  const a=document.getElementById('ra').value,g=document.getElementById('rg').value;
  if(!n||!p)return setMsg('rm-msg','أدخل جميع البيانات','e');
  if(!checkUsername(n))return setMsg('rm-msg','❌ اسم المستخدم غير مقبول - اختر اسماً لائقاً','e');
  if(p!==p2)return setMsg('rm-msg','كلمتا المرور غير متطابقتين','e');
  if(p.length<4)return setMsg('rm-msg','كلمة المرور قصيرة','e');
  try{
    const r=await fetch('/api/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:n,password:p,gender:g,age:a})});
    const d=await r.json();
    if(!d.ok)return setMsg('rm-msg',d.msg,'e');
    setMsg('rm-msg','تم التسجيل! جاري الدخول...','k');
    cu={name:n,rank:'member',age:a,gender:g};
    sessionStorage.setItem('ghazal_user', JSON.stringify(cu));
    setTimeout(()=>{closeM('r');enterChat();},800);
  }catch(e){setMsg('rm-msg','خطأ في الاتصال','e');}
}

function enterChat(){
  document.getElementById('landing').style.display='none';
  document.getElementById('chat-page').style.display='flex';
  cr='general';
  socket.emit('join',cu);
  if(ADMIN_RANKS.includes(cu.rank)){
    document.getElementById('admin-btn').style.display='flex';
  }
  // Show change password button only for registered members
  if(cu.rank !== 'visitor'){
    document.getElementById('chpass-btn').style.display='flex';
  }
  // Show points for all users
  const pb=document.getElementById('points-badge');
  if(pb){pb.style.display='inline-flex';pb.textContent='🏆 '+(cu.points||0)+' نقطة';}
  // Show voice bar
  showVoiceBar();
  showMobAdmin();
  const b=document.getElementById('my-badge');
  b.style.display='inline-flex';
  b.textContent=RK_LABEL[cu.rank]||'👁️ زائر';
  b.style.color=RK_COLOR[cu.rank]||'#b0bec5';
  b.style.borderColor=(RK_COLOR[cu.rank]||'#b0bec5')+'55';
  b.style.background=(RK_COLOR[cu.rank]||'#b0bec5')+'15';
}

// Check session on load - wait for socket to connect first
window.onload = () => {
  const saved = sessionStorage.getItem('ghazal_user');
  if (saved) {
    cu = JSON.parse(saved);
    // If socket already connected, join now
    if (socket.connected) {
      enterChat();
    } else {
      // Wait for connection
      socket.once('connect', () => enterChat());
    }
  }
};

// SOCKET EVENTS
socket.on('init',(d)=>{
  rd = d.rooms;
  window._liveUsers = {};
  window._avatarCache = window._avatarCache || {};
  renderRooms();
  upOC(d.onlineCount);
  d.messages.forEach(m=>renderMsg(m));
  // Broadcast initial room counts
  if(d.roomCounts) {
    Object.entries(d.roomCounts).forEach(([id,count]) => {
      const el = document.getElementById('rc-'+id);
      if(el) el.textContent = count + ' متصل';
    });
  }
});
socket.on('message',m=>{if(m.room===cr)renderMsg(m);});
socket.on('room-counts', counts => {
  Object.entries(counts).forEach(([id, count]) => {
    // Update desktop rooms list
    const el = document.getElementById('rc-' + id);
    if (el) el.textContent = count + ' متصل';
    // Update mobile rooms list
    const mob = document.getElementById('mrc-' + id);
    if (mob) mob.textContent = count + ' متصل';
  });
});

socket.on('room-users',u=>{
  renderUsers(u);
  document.getElementById('crc').textContent=`🟢 ${u.length} متصل`;
  // Update count in rooms list
  const rcEl = document.getElementById('rc-'+cr);
  if(rcEl) rcEl.textContent = u.length + ' متصل';
  const rcMobEl = document.getElementById('mrc-'+cr);
  if(rcMobEl) rcMobEl.textContent = u.length + ' متصل';
});
socket.on('room-history',d=>{if(d.roomId===cr){const c=document.getElementById('msgs');c.innerHTML=`<div class="welcome">🌟 أهلاً في ${rd[d.roomId]?.name||d.roomId} 🌟</div>`;d.messages.forEach(m=>renderMsg(m));renderUsers(d.users);document.getElementById('crc').textContent=`🟢 ${d.users.length} متصل`;}});
socket.on('online-count',upOC);
socket.on('system-notice',t=>{const c=document.getElementById('msgs');const d=document.createElement('div');d.className='ntc';d.textContent=t;c.appendChild(d);c.scrollTop=c.scrollHeight;});
socket.on('rooms-updated', (newRooms) => {
  rd = newRooms;

function renderRooms(){
  const c=document.getElementById('rlist');c.innerHTML='';
  Object.entries(rd).forEach(([id,r])=>{
    const d=document.createElement('div');d.className='ri'+(id===cr?' on':'');d.id='ri-'+id;
    d.innerHTML=`<div class="r-ic" style="background:${RC[id]||'#333'}">${r.icon}</div><div style="flex:1;min-width:0;"><div class="r-nm">${r.name}</div><div class="r-cn" id="rc-${id}">0 متصل</div></div>`;
    d.onclick=()=>swRoom(id,r);c.appendChild(d);
  });
  syncMobLists();
}

function swRoom(id,r){
  if(id===cr)return;cr=id;
  document.querySelectorAll('.ri').forEach(x=>x.classList.remove('on'));
  document.getElementById('ri-'+id)?.classList.add('on');
  document.getElementById('crn').textContent=r.name;
  document.getElementById('cri').textContent=r.icon;
  socket.emit('switch-room',id);
}

function renderMsg(m){
  const c=document.getElementById('msgs');
  if(m.type==='system'){
    const d=document.createElement('div');d.className='sys';d.textContent=m.text;c.appendChild(d);
    c.scrollTop=c.scrollHeight; return;
  }
  if(m.type==='quiz'){
    const d=document.createElement('div');d.className='quiz-msg';
    d.innerHTML=`<span class="quiz-bot-badge">🏆 مسابقات</span><span class="quiz-text">${esc(m.text)}</span><span class="mt">${m.time||''}</span>`;
    c.appendChild(d); c.scrollTop=c.scrollHeight; return;
  }
  const u=m.user||{name:m.username||'?',rank:'visitor'};
  const rk=getRK(u.rank);
  const col=AVC[(u.name||'?').charCodeAt(0)%AVC.length];
  const glowStyle=rk.glow&&rk.glow!=='none'?`text-shadow:${rk.glow};`:'';
  const nameStyle=`color:${rk.color};font-size:${rk.fontSize};font-weight:${rk.fontWeight};${glowStyle}`;
  const d=document.createElement('div');d.className='msg'+(rk.bigName?' msg-big':'');
  d.innerHTML=`<div class="av" style="background:linear-gradient(135deg,${col},${col}99);border:2px solid ${rk.color}44;cursor:pointer" onclick="openProfile('${u.name.replace(/'/g,"\\'")}')">
    ${window._avatarCache&&window._avatarCache[u.name]?`<img src="${window._avatarCache[u.name]}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`:(u.name||'?').charAt(0)}</div>
    <div class="mc"><div class="mh">
      <span class="mn" style="${nameStyle};cursor:pointer" onclick="openProfile('${u.name.replace(/'/g,"\\'")}'">${u.name}</span>
      <span class="mb" style="background:${rk.color}22;color:${rk.color};border:1px solid ${rk.color}44">${rk.label}</span>
      <span class="mt">${m.time||''}</span>
    </div><div class="mx">${esc(m.text)}</div></div>`;
  c.appendChild(d);
  c.scrollTop=c.scrollHeight;
}

function renderUsers(users){
  const c=document.getElementById('ulist');c.innerHTML='';
  window._liveUsers = {};
  users.forEach(u=>{ window._liveUsers[u.name]=u; });
  document.getElementById('uc').textContent=users.length;
  const groups={owner:[],owner_admin:[],owner_vip:[],super_admin:[],admin:[],premium:[],vip:[],gold:[],member:[],visitor:[]};
  users.forEach(u=>{(groups[u.rank]||groups.visitor).push(u);});
  if(groups.owner.length) addSec(c,'👑 المالك',groups.owner);
  if(groups.owner_admin.length) addSec(c,'💼 أونر إداري',groups.owner_admin);
  if(groups.owner_vip.length) addSec(c,'⭐ أونر',groups.owner_vip);
  if(groups.super_admin.length) addSec(c,'🔱 سوبر أدمن',groups.super_admin);
  if(groups.admin.length) addSec(c,'⚙️ أدمن',groups.admin);
  if(groups.premium.length) addSec(c,'💎 بريميوم',groups.premium);
  if(groups.vip.length) addSec(c,'🌟 عضو مميز',groups.vip);
  if(groups.gold.length) addSec(c,'🥇 عضو ذهبي',groups.gold);
  if(groups.member.length) addSec(c,'👤 أعضاء',groups.member);
  if(groups.visitor.length) addSec(c,'👁️ زوار',groups.visitor);
  syncMobLists();
}

function addSec(c,t,users){
  const l=document.createElement('div');l.className='usl';l.textContent=t;c.appendChild(l);
  users.forEach(u=>{
    const rk=getRK(u.rank);
    const col=AVC[(u.name||'?').charCodeAt(0)%AVC.length];
    const glowStyle=rk.glow&&rk.glow!=='none'?`text-shadow:${rk.glow};`:'';
    const d=document.createElement('div');d.className='ui';
    d.innerHTML=`<div class="uav" style="background:linear-gradient(135deg,${col},${col}99);border:2px solid ${rk.color}55">${(u.name||'?').charAt(0)}<div class="udot"></div></div>
      <div style="flex:1;min-width:0;"><div class="un" style="color:${rk.color};font-size:${rk.fontSize};font-weight:${rk.fontWeight};${glowStyle}">${u.name}</div><div class="um">${u.gender==='أنثى'?'👩':'👨'} ${u.gender||''} · ${u.age||''}</div></div>`;
    d.addEventListener('contextmenu',e=>{e.preventDefault();openCtx(e,u.name);});
    d.onclick=()=>openProfile(u.name);
    c.appendChild(d);
  });
}

let currentCat = 'faces';
function showCat(cat) {
  currentCat = cat;
  document.querySelectorAll('.ep-cat').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderEmojiGrid(cat);
}

function renderEmojiGrid(cat) {
  const grid = document.getElementById('ep-grid');
  if (!grid) return;
  grid.innerHTML = '';
  (EMOJIS[cat] || EMOJIS.faces).forEach(em => {
    const b = document.createElement('button');
    b.className = 'eb';
    b.textContent = em;
    b.onclick = () => ae(em);
    grid.appendChild(b);
  });
}

function te() {
  eo = !eo;
  const picker = document.getElementById('ep');
  picker.classList.toggle('on', eo);
  if (eo) renderEmojiGrid(currentCat);
}

let lastSent = {text:'', time:0};
function sm(){
  const i=document.getElementById('min');
  const t=i.value.trim();
  if(!t)return;
  const now=Date.now();
  // Client-side duplicate check
  if(t===lastSent.text && now-lastSent.time < 3000){
    i.placeholder='⚠️ لا تكرر نفس الرسالة';
    setTimeout(()=>i.placeholder='اكتب رسالتك هنا...',2000);
    return;
  }
  lastSent={text:t,time:now};
  socket.emit('chat-message',{text:t});
  i.value='';
  if(eo)te();
}
function hk(e){if(e.key==='Enter')sm();}
// te() defined above
function ae(e){
  document.getElementById('min').value += e;
  document.getElementById('min').focus();
  // Don't close picker after selecting emoji
}

async function addRoom() {
  const name = document.getElementById('new-room-name').value.trim();
  const icon = document.getElementById('new-room-icon').value.trim() || '🏠';
  const color = document.getElementById('new-room-color').value;

async function deleteRoom(id, name) {

  else toast('❌ ' + d.msg, 'e');

// ===== BAD WORDS MANAGEMENT =====
let bwData = { default: [], custom: [] };
let currentBWTab = 'custom';

async function loadBadWords() {
  try {
    const r = await fetch('/api/admin/badwords', { headers: { 'x-admin-token': AK } });
    const d = await r.json();
    if (!d.ok) return;
    bwData = d;
    document.getElementById('custom-count').textContent = d.custom.length;
    document.getElementById('default-count').textContent = d.default.length;
    renderBadWords();
  } catch(e) { console.error(e); }
}

function showBWTab(tab) {
  currentBWTab = tab;
  document.getElementById('bw-tab-custom').classList.toggle('on', tab === 'custom');
  document.getElementById('bw-tab-default').classList.toggle('on', tab === 'default');
  renderBadWords();
}

function filterBadWords() {
  renderBadWords();
}

function renderBadWords() {
  const search = (document.getElementById('bw-search')?.value || '').toLowerCase();
  const list = document.getElementById('bw-list');
  if (!list) return;
  
  const words = currentBWTab === 'custom' ? bwData.custom : bwData.default;
  const filtered = search ? words.filter(w => w.includes(search)) : words;
  
  if (filtered.length === 0) {
    list.innerHTML = `<div style="color:var(--mut);font-size:12px;padding:10px;">${search ? 'لا توجد نتائج' : currentBWTab === 'custom' ? 'لا توجد كلمات مضافة بعد' : ''}</div>`;
    return;
  }

  list.innerHTML = filtered.map(w => `
    <div style="display:inline-flex;align-items:center;gap:5px;background:rgba(239,83,80,.12);border:1px solid rgba(239,83,80,.25);border-radius:20px;padding:4px 10px;font-size:12px;color:#ef9a9a;">
      <span>${w}</span>
      <button onclick="${currentBWTab === 'custom' ? `removeBadWord('${w}')` : `removeDefaultWord('${w}')`}" 
        style="background:transparent;border:none;color:#ef5350;cursor:pointer;font-size:14px;padding:0;line-height:1;">×</button>
    </div>
  `).join('');
}

async function addBadWord() {
  const input = document.getElementById('new-bad-word');
  const word = input.value.trim();
  const msgEl = document.getElementById('bw-msg');
  if (!word) return (msgEl.textContent='أدخل الكلمة', msgEl.className='fmsg e');
  
  try {
    const r = await fetch('/api/admin/badwords/add', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-admin-token': AK },
      body: JSON.stringify({ word })
    });
    const d = await r.json();
    if (!d.ok) return (msgEl.textContent=d.msg, msgEl.className='fmsg e');
    
    msgEl.textContent = '✅ تمت إضافة: ' + word;
    msgEl.className = 'fmsg k';
    input.value = '';
    bwData.custom = d.custom;
    document.getElementById('custom-count').textContent = d.custom.length;
    currentBWTab = 'custom';
    showBWTab('custom');
    toast('✅ تمت إضافة كلمة ممنوعة جديدة', 'k');
    setTimeout(() => msgEl.className='fmsg', 3000);
  } catch(e) { msgEl.textContent='خطأ'; msgEl.className='fmsg e'; }
}

async function removeBadWord(word) {
  if (!confirm('حذف "' + word + '" من القائمة؟')) return;
  const r = await fetch('/api/admin/badwords/remove', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-admin-token': AK },
    body: JSON.stringify({ word })
  });
  const d = await r.json();
  if (d.ok) {
    bwData.custom = d.custom;
    document.getElementById('custom-count').textContent = d.custom.length;
    renderBadWords();
    toast('🗑️ تم حذف الكلمة', 'k');
  }
}

async function removeDefaultWord(word) {
  if (!confirm('حذف "' + word + '" من القائمة الافتراضية؟')) return;
  const r = await fetch('/api/admin/badwords/removedefault', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-admin-token': AK },
    body: JSON.stringify({ word })
  });
  const d = await r.json();
  if (d.ok) {
    bwData.default = bwData.default.filter(w => w !== word);
    document.getElementById('default-count').textContent = bwData.default.length;
    renderBadWords();
    toast('🗑️ تم حذف الكلمة', 'k');
  }
}

async function changeMyPass(){
  const oldp=document.getElementById('cp-old').value;
  const newp=document.getElementById('cp-new').value;
  const newp2=document.getElementById('cp-new2').value;
  const msgEl=document.getElementById('cpm-msg');

  if(!oldp||!newp||!newp2)return(msgEl.textContent='أدخل جميع الحقول',msgEl.className='fmsg e');
  if(newp!==newp2)return(msgEl.textContent='كلمة المرور الجديدة غير متطابقة',msgEl.className='fmsg e');
  if(newp.length<4)return(msgEl.textContent='كلمة المرور قصيرة جداً (4 أحرف على الأقل)',msgEl.className='fmsg e');
  if(oldp===newp)return(msgEl.textContent='كلمة المرور الجديدة مطابقة للقديمة',msgEl.className='fmsg e');

  try{
    const r=await fetch('/api/changepass',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:cu.name,oldpassword:oldp,newpassword:newp})});
    const d=await r.json();
    if(!d.ok)return(msgEl.textContent=d.msg,msgEl.className='fmsg e');
    msgEl.textContent='✅ تم تغيير كلمة المرور بنجاح!';
    msgEl.className='fmsg k';
    toast('✅ تم تغيير كلمة المرور بنجاح','k');
    setTimeout(()=>{closeM('cp');},2000);
  }catch(e){msgEl.textContent='خطأ في الاتصال';msgEl.className='fmsg e';}
}

async function resetPassInline(){
  const u=document.getElementById('rpu-inline').value.trim();
  const p=document.getElementById('rpp-inline').value;
  const msgEl=document.getElementById('rpi-msg');
  if(!u||!p)return (msgEl.textContent='أدخل اسم المستخدم وكلمة المرور',msgEl.className='fmsg e');
  if(p.length<4)return (msgEl.textContent='كلمة المرور قصيرة جداً',msgEl.className='fmsg e');
  try{
    const r=await fetch('/api/admin/resetpass',{method:'POST',headers:{'Content-Type':'application/json','x-admin-token':AK},body:JSON.stringify({username:u,newpassword:p})});
    const d=await r.json();
    if(!d.ok)return (msgEl.textContent=d.msg,msgEl.className='fmsg e');
    msgEl.textContent='✅ تم تغيير كلمة مرور '+u+' بنجاح';
    msgEl.className='fmsg k';
    document.getElementById('rpu-inline').value='';
    document.getElementById('rpp-inline').value='';
    toast('✅ تم تغيير كلمة مرور '+u,'k');
    setTimeout(()=>msgEl.className='fmsg',3000);
  }catch(e){msgEl.textContent='خطأ في الاتصال';msgEl.className='fmsg e';}
}

function syncMobLists() {
  // Sync rooms to mobile drawer
  const rlistMob = document.getElementById('rlist-mob');
  if (rlistMob && Object.keys(rd).length) {
    rlistMob.innerHTML = '';
    Object.entries(rd).forEach(([id, r]) => {
      const d = document.createElement('div');
      d.className = 'ri' + (id === cr ? ' on' : '');
      d.style.cssText = 'padding:14px 16px;margin-bottom:6px;cursor:pointer;';

      d.onclick = () => {
        swRoom(id, r);
        closeMobDrawer('rooms');

        rlistMob.querySelectorAll('.ri').forEach(x => x.classList.remove('on'));
        d.classList.add('on');
      };

    });

  const ulistMob = document.getElementById('ulist-mob');
  const ulist = document.getElementById('ulist');
  if (ulistMob && ulist) {
    ulistMob.innerHTML = ulist.innerHTML;
  }
}

// ===== VOICE/VIDEO (WebRTC) =====
let localStream=null; let peerConnections={}; let inVoice=false; let micOn=true; let camOn=false;
const ICE_SERVERS={iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}]};

async function joinVoice(){
  try {
    localStream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});
    inVoice=true; micOn=true;
    document.getElementById('voice-join-btn').style.display='none';
    document.getElementById('mic-btn').style.display='';
    document.getElementById('cam-btn').style.display='';
    document.getElementById('voice-leave-btn').style.display='';
    socket.emit('voice-join',cr);
    addVoiceChip(cu.username,'local');
    toast('🎤 انضممت للغرفة الصوتية','k');
    // Add local video element
    addVideoElement('local',localStream,cu.username);
  } catch(e){ toast('❌ لا يمكن الوصول للمايك: '+e.message,'e'); }
}

function toggleMic(){
  if (!localStream) return;
  micOn=!micOn;
  localStream.getAudioTracks().forEach(t=>t.enabled=micOn);
  const btn=document.getElementById('mic-btn');
  btn.textContent=micOn?'🎤 مايك':'🔇 صامت';
  btn.className='voice-btn '+(micOn?'vbtn-mic':'vbtn-mic muted');
}

async function toggleCam(){
  if (!localStream) return;
  camOn=!camOn;
  if (camOn){
    try {
      const vs=await navigator.mediaDevices.getUserMedia({video:true});
      vs.getVideoTracks().forEach(t=>localStream.addTrack(t));
      // Add video to existing peer connections
      Object.values(peerConnections).forEach(pc=>{
        vs.getVideoTracks().forEach(t=>pc.addTrack(t,localStream));
      });
      document.getElementById('video-overlay').classList.add('show');
      addVideoElement('local',localStream,cu.username);
      document.getElementById('cam-btn').textContent='📷 كاميرا';
      document.getElementById('cam-btn').className='voice-btn vbtn-cam';
    } catch(e){ camOn=false; toast('❌ لا يمكن الوصول للكاميرا','e'); }
  } else {
    localStream.getVideoTracks().forEach(t=>{t.stop();localStream.removeTrack(t);});
    document.getElementById('cam-btn').textContent='📹 تشغيل';
    document.getElementById('cam-btn').className='voice-btn vbtn-cam off';
    if (!Object.values(peerConnections).some(pc=>pc.remoteVideoActive)) {
      document.getElementById('video-overlay').classList.remove('show');
    }
  }
}

function leaveVoice(){
  if (localStream) { localStream.getTracks().forEach(t=>t.stop()); localStream=null; }
  Object.keys(peerConnections).forEach(id=>closePeerConnection(id));
  peerConnections={};
  inVoice=false;
  socket.emit('voice-leave',cr);
  document.getElementById('voice-join-btn').style.display='';
  document.getElementById('mic-btn').style.display='none';
  document.getElementById('cam-btn').style.display='none';
  document.getElementById('voice-leave-btn').style.display='none';
  document.getElementById('voice-users').innerHTML='';
  document.getElementById('video-overlay').classList.remove('show');
  document.getElementById('video-grid').innerHTML='';
  toast('📴 غادرت الغرفة الصوتية','e');
}

function closeVideoOverlay(){ document.getElementById('video-overlay').classList.remove('show'); }

function addVideoElement(id,stream,name){
  const grid=document.getElementById('video-grid');
  let item=document.getElementById('vid-'+id);
  if (!item){ item=document.createElement('div'); item.className='video-item'; item.id='vid-'+id; grid.appendChild(item); }
  item.innerHTML=`<video autoplay playsinline muted="${id==='local'}"></video><div class="vname">${name}</div>`;
  item.querySelector('video').srcObject=stream;
}

async function createPeerConnection(peerId,isInitiator){
  const pc=new RTCPeerConnection(ICE_SERVERS);
  peerConnections[peerId]=pc;
  if (localStream) localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));
  pc.onicecandidate=e=>{ if(e.candidate) socket.emit('rtc-ice',{to:peerId,candidate:e.candidate}); };
  pc.ontrack=e=>{ const s=e.streams[0]; addVideoElement(peerId,s,'مستخدم'); if(e.track.kind==='video'){document.getElementById('video-overlay').classList.add('show');} };
  if (isInitiator){
    const offer=await pc.createOffer();
    await pc.setLocalDescription(offer);
    socket.emit('rtc-offer',{to:peerId,offer});
  }
  return pc;
}

async function handleOffer(from,offer){
  const pc=await createPeerConnection(from,false);
  await pc.setRemoteDescription(new RTCSessionDescription(offer));
  const answer=await pc.createAnswer();
  await pc.setLocalDescription(answer);
  socket.emit('rtc-answer',{to:from,answer});
}

async function handleAnswer(from,answer){
  const pc=peerConnections[from]; if (!pc) return;
  await pc.setRemoteDescription(new RTCSessionDescription(answer));
}

async function handleIce(from,candidate){
  const pc=peerConnections[from]; if (!pc) return;
  try { await pc.addIceCandidate(new RTCIceCandidate(candidate)); } catch(e){}
}

function closePeerConnection(peerId){
  if (peerConnections[peerId]) { peerConnections[peerId].close(); delete peerConnections[peerId]; }
  const vi=document.getElementById('vid-'+peerId); if (vi) vi.remove();
}

  if (document.getElementById('vc-'+peerId)) return;
  const chip=document.createElement('div'); chip.className='vu-chip'; chip.id='vc-'+peerId;
  chip.textContent='🎤 '+username; c.appendChild(chip);
}

async function openProfile(username) {
  const modal = document.getElementById('profile-modal');

    const d = await r.json();
    if (!d.ok) { toast('❌ لم يتم العثور على الملف','e'); closeProfile(); return; }
    const p = d.profile;
    const rk = RANKS_DATA[p.rank]||RANKS_DATA['visitor'];

    badge.style.cssText = `font-size:12px;padding:2px 10px;border-radius:12px;display:inline-block;background:${rk.color}22;color:${rk.color};border:1px solid ${rk.color}44;`;

    // Avatar
    const initials = document.getElementById('profile-avatar-initials');
    initials.textContent = (p.username||'?').charAt(0).toUpperCase();
    initials.style.background = `linear-gradient(135deg,${col},${col}99)`;
    const avatarWrap = document.getElementById('profile-avatar-wrap');
    avatarWrap.style.borderColor = rk.color;
    if (p.avatar) {
      document.getElementById('profile-avatar-img').src = p.avatar;
      document.getElementById('profile-avatar-img').style.display = 'block';
      initials.style.display='none';
    } else {

      initials.style.display='flex';
    }

    document.getElementById('profile-bio').textContent = p.bio || '';

    // Stats
    document.getElementById('profile-points').textContent = (p.points||0).toLocaleString();
    document.getElementById('profile-gender-age').textContent =
      (liveUser.gender||'') + (liveUser.age?' · '+liveUser.age:'');

    // Cover color based on rank
    document.getElementById('profile-cover').style.background =
      `linear-gradient(135deg,${rk.color}33,#0d1117,${rk.color}11)`;

    // Music
    if (p.music_url) {
      document.getElementById('profile-music-indicator').style.display='flex';
      document.getElementById('profile-music-name').textContent = p.music_name||'موسيقى';
      playProfileMusic(p.music_url, p.music_name);
    }

    // Actions
    const actions = document.getElementById('profile-actions');
    if (p.username !== cu?.username) {
      // PM button
      const pmBtn = document.createElement('button');
      pmBtn.className='profile-action-btn';
      pmBtn.style.cssText='background:#1565c0;color:#fff;';
      pmBtn.innerHTML='💌 رسالة خاصة';
      pmBtn.onclick=()=>{ closeProfile(); openPM(p.username); };
      actions.appendChild(pmBtn);
      // Admin actions
      if (ADMIN_RANKS.includes(cu?.rank)) {
        const muteBtn = document.createElement('button');
        muteBtn.className='profile-action-btn';
        muteBtn.style.cssText='background:#e65100;color:#fff;';
        muteBtn.innerHTML='🔇 كتم';
        muteBtn.onclick=()=>{ socket.emit('admin-mute',{username:p.username}); closeProfile(); };
        actions.appendChild(muteBtn);
        const kickBtn = document.createElement('button');
        kickBtn.className='profile-action-btn';
        kickBtn.style.cssText='background:#c62828;color:#fff;';

        kickBtn.onclick=()=>{ socket.emit('admin-kick',{username:p.username}); closeProfile(); };

      document.getElementById('profile-music-input').value = p.music_url||'';
      document.getElementById('profile-music-name-input').value = p.music_name||'';

async function handleAvatarUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  if (file.size > 2*1024*1024) { toast('❌ الصورة كبيرة جداً، الحد الأقصى 2MB','e'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    const base64 = e.target.result;
    document.getElementById('profile-avatar-img').src = base64;
    document.getElementById('profile-avatar-img').style.display='block';
    document.getElementById('profile-avatar-initials').style.display='none';
    // Store temporarily
    window._pendingAvatar = base64;
    toast('✅ تم اختيار الصورة، اضغط حفظ','k');
  };
  reader.readAsDataURL(file);
}

async function saveProfile() {
  const bio = document.getElementById('profile-bio-input').value.trim();
  const music_url = document.getElementById('profile-music-input').value.trim();
  const music_name = document.getElementById('profile-music-name-input').value.trim();
  const avatar = window._pendingAvatar || null;

  try {
    const r = await fetch('/api/profile/update', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ username:cu.username, bio, music_url, music_name, avatar })
    });
    const d = await r.json();
    if (d.ok) {
      toast('✅ تم حفظ الملف الشخصي','k');
      window._pendingAvatar = null;
      // Update avatar in chat
      if (avatar) window._myAvatar = avatar;
      closeProfile();
    } else { toast('❌ '+d.msg,'e'); }
  } catch(e) { toast('❌ خطأ في الحفظ','e'); }
}
